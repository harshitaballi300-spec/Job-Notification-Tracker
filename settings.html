<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Job Notification Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        /* Navigation Styles */
        .nav-header {
            background-color: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            position: sticky;
            top: 0;
            z-index: var(--z-topbar);
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .nav-brand {
            font-family: var(--font-heading);
            font-size: var(--text-lg);
            color: var(--color-text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: var(--space-1);
        }

        .nav-links {
            display: flex;
            gap: var(--space-3);
        }

        .nav-link {
            font-family: var(--font-body);
            font-size: var(--text-sm);
            font-weight: var(--weight-medium);
            color: var(--color-muted);
            text-decoration: none;
            padding: var(--space-2) 0;
            border-bottom: 2px solid transparent;
            transition: color var(--duration-fast) var(--easing-standard);
        }

        .nav-link:hover {
            color: var(--color-text);
        }

        .nav-link.active {
            color: var(--color-text);
            border-bottom-color: var(--color-accent);
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: var(--text-2xl);
            cursor: pointer;
            color: var(--color-text);
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 64px;
                left: 0;
                right: 0;
                background-color: var(--color-surface);
                flex-direction: column;
                padding: var(--space-3) var(--space-5);
                border-bottom: 1px solid var(--color-border);
                box-shadow: var(--shadow-card);
            }

            .nav-links.show {
                display: flex;
            }

            .mobile-menu-btn {
                display: block;
            }
        }

        /* Page Header Styles */
        .page-header {
            padding: var(--space-5) 0;
            border-bottom: 1px solid var(--color-border);
            margin-bottom: var(--space-5);
        }

        .page-title {
            font-family: var(--font-heading);
            font-size: var(--text-2xl);
            color: var(--color-text);
            margin-bottom: var(--space-1);
        }

        .page-subtitle {
            font-size: var(--text-md);
            color: var(--color-muted);
        }

        /* Form Container */
        .form-container {
            max-width: 600px;
        }
    </style>
</head>

<body>

    <header class="nav-header">
        <div class="container nav-container">
            <a href="index.html" class="nav-brand">
                <div class="top-bar__logo-dot"></div>
                Job Tracker
            </a>

            <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">☰</button>

            <nav class="nav-links" id="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="saved.html" class="nav-link">Saved</a>
                <a href="digest.html" class="nav-link">Digest</a>
                <a href="settings.html" class="nav-link active">Settings</a>
                <a href="proof.html" class="nav-link">Proof</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title">Settings</h1>
            <p class="page-subtitle">Configure your job tracking preferences.</p>
        </div>

        <div class="form-container">
            <div class="card">
                <div class="card__header">
                    <h2 class="card__title">Job Preferences</h2>
                </div>
                <hr class="card__divider">

                <div class="field-group">
                    <label class="field-label" for="role-keywords">Role Keywords</label>
                    <input type="text" id="role-keywords" class="field-input"
                        placeholder="e.g. Frontend Engineer, Product Manager">
                    <p class="field-hint">Separate keywords with commas.</p>
                </div>

                <div class="field-group">
                    <label class="field-label" for="locations">Preferred Locations</label>
                    <select id="locations" class="field-input field-input--select" multiple
                        style="height: auto; min-height: 100px;">
                        <!-- Options will be populated via JS -->
                    </select>
                    <p class="field-hint">Hold Ctrl (Cmd) to select multiple.</p>
                </div>

                <div class="field-group">
                    <label class="field-label">Preferred Mode</label>
                    <div style="display: flex; gap: var(--space-4); margin-top: var(--space-1);">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="checkbox" name="work-mode" value="Remote"> Remote
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="checkbox" name="work-mode" value="Hybrid"> Hybrid
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="checkbox" name="work-mode" value="Onsite"> Onsite
                        </label>
                    </div>
                </div>

                <div class="field-group">
                    <label class="field-label" for="experience">Experience Level</label>
                    <select id="experience" class="field-input field-input--select">
                        <option value="">Any</option>
                        <option value="Fresher">Fresher</option>
                        <option value="0-1">0-1 Year</option>
                        <option value="1-3">1-3 Years</option>
                        <option value="3-5">3-5 Years</option>
                    </select>
                </div>

                <div class="field-group">
                    <label class="field-label" for="skills">Skills</label>
                    <input type="text" id="skills" class="field-input" placeholder="e.g. React, Python, AWS">
                    <p class="field-hint">Separate skills with commas.</p>
                </div>

                <div class="field-group">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label class="field-label" for="min-match-score">Minimum Match Score</label>
                        <span id="score-value" style="font-weight: 600; color: var(--color-accent);">40</span>
                    </div>
                    <input type="range" id="min-match-score" class="field-input" min="0" max="100" value="40"
                        style="padding: 0; cursor: pointer;">
                    <p class="field-hint">Only show jobs that match at least this much of your profile.</p>
                </div>

                <div class="card__actions" style="margin-top: var(--space-4);">
                    <button id="save-settings" class="btn btn--primary">Save Preferences</button>
                    <button id="reset-settings" class="btn btn--secondary">Reset</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Load data -->
    <script src="js/data.js"></script>
    <script>
        // 1. Mobile Menu Toggle
        document.getElementById('mobile-menu-btn').addEventListener('click', function () {
            document.getElementById('nav-links').classList.toggle('show');
        });

        // 2. DOM Elements
        const roleKeywordsInput = document.getElementById('role-keywords');
        const locationsSelect = document.getElementById('locations');
        const modeCheckboxes = document.getElementsByName('work-mode');
        const experienceSelect = document.getElementById('experience');
        const skillsInput = document.getElementById('skills');
        const minMatchScoreInput = document.getElementById('min-match-score');
        const scoreValueDisplay = document.getElementById('score-value');
        const saveBtn = document.getElementById('save-settings');
        const resetBtn = document.getElementById('reset-settings');

        // 3. Populate Locations from data
        let jobs = [];
        if (typeof getJobsData !== 'undefined') {
            jobs = getJobsData();
        }
        const uniqueLocations = [...new Set(jobs.map(j => j.location))].sort();
        uniqueLocations.forEach(loc => {
            const opt = document.createElement('option');
            opt.value = loc;
            opt.textContent = loc;
            locationsSelect.appendChild(opt);
        });

        // 4. Slider Display Logic
        minMatchScoreInput.addEventListener('input', (e) => {
            scoreValueDisplay.textContent = e.target.value;
        });

        // 5. Load Preferences
        function loadPreferences() {
            const savedPrefs = localStorage.getItem('jobTrackerPreferences');
            if (savedPrefs) {
                const prefs = JSON.parse(savedPrefs);

                roleKeywordsInput.value = (prefs.roleKeywords || []).join(', ');

                // Set multi-select locations
                const preferredLocations = prefs.preferredLocations || [];
                Array.from(locationsSelect.options).forEach(opt => {
                    opt.selected = preferredLocations.includes(opt.value);
                });

                // Set checkboxes for mode
                const preferredMode = prefs.preferredMode || [];
                modeCheckboxes.forEach(cb => {
                    cb.checked = preferredMode.includes(cb.value);
                });

                experienceSelect.value = prefs.experienceLevel || '';
                skillsInput.value = (prefs.skills || []).join(', ');
                minMatchScoreInput.value = prefs.minMatchScore || 40;
                scoreValueDisplay.textContent = minMatchScoreInput.value;
            }
        }

        // 6. Save Preferences
        saveBtn.addEventListener('click', () => {
            const roleKeywords = roleKeywordsInput.value.split(',').map(s => s.trim()).filter(s => s !== '');
            const preferredLocations = Array.from(locationsSelect.selectedOptions).map(opt => opt.value);
            const preferredMode = Array.from(modeCheckboxes).filter(cb => cb.checked).map(cb => cb.value);
            const experienceLevel = experienceSelect.value;
            const skills = skillsInput.value.split(',').map(s => s.trim()).filter(s => s !== '');
            const minMatchScore = parseInt(minMatchScoreInput.value);

            const prefs = {
                roleKeywords,
                preferredLocations,
                preferredMode,
                experienceLevel,
                skills,
                minMatchScore
            };

            localStorage.setItem('jobTrackerPreferences', JSON.stringify(prefs));

            // Visual feedback
            const originalText = saveBtn.textContent;
            saveBtn.textContent = 'Settings Saved! ✓';
            saveBtn.classList.add('btn--success');
            setTimeout(() => {
                saveBtn.textContent = originalText;
                saveBtn.classList.remove('btn--success');
            }, 2000);
        });

        // 7. Reset Logic
        resetBtn.addEventListener('click', () => {
            if (confirm('Are you sure you want to reset all preferences?')) {
                localStorage.removeItem('jobTrackerPreferences');
                location.reload();
            }
        });

        // Init
        loadPreferences();
    </script>
</body>

</html>
