<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proof - Job Notification Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        /* Navigation Styles */
        .nav-header {
            background-color: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            position: sticky;
            top: 0;
            z-index: var(--z-topbar);
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .nav-brand {
            font-family: var(--font-heading);
            font-size: var(--text-lg);
            color: var(--color-text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: var(--space-1);
        }

        .nav-links {
            display: flex;
            gap: var(--space-3);
        }

        .nav-link {
            font-family: var(--font-body);
            font-size: var(--text-sm);
            font-weight: var(--weight-medium);
            color: var(--color-muted);
            text-decoration: none;
            padding: var(--space-2) 0;
            border-bottom: 2px solid transparent;
            transition: color var(--duration-fast) var(--easing-standard);
        }

        .nav-link:hover {
            color: var(--color-text);
        }

        .nav-link.active {
            color: var(--color-text);
            border-bottom-color: var(--color-accent);
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: var(--text-2xl);
            cursor: pointer;
            color: var(--color-text);
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 64px;
                left: 0;
                right: 0;
                background-color: var(--color-surface);
                flex-direction: column;
                padding: var(--space-3) var(--space-5);
                border-bottom: 1px solid var(--color-border);
                box-shadow: var(--shadow-card);
            }

            .nav-links.show {
                display: flex;
            }

            .mobile-menu-btn {
                display: block;
            }
        }

        /* Page Header Styles */
        .page-header {
            padding: var(--space-5) 0;
            border-bottom: 1px solid var(--color-border);
            margin-bottom: var(--space-5);
        }

        .page-title {
            font-family: var(--font-heading);
            font-size: var(--text-2xl);
            color: var(--color-text);
            margin-bottom: var(--space-1);
        }
    </style>
</head>

<body>

    <header class="nav-header">
        <div class="container nav-container">
            <a href="index.html" class="nav-brand">
                <div class="top-bar__logo-dot"></div>
                Job Tracker
            </a>

            <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">☰</button>

            <nav class="nav-links" id="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="saved.html" class="nav-link">Saved</a>
                <a href="digest.html" class="nav-link">Digest</a>
                <a href="settings.html" class="nav-link">Settings</a>
                <a href="proof.html" class="nav-link active">Proof</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title">Proof</h1>
        </div>

        <div class="empty-state">
            <div class="empty-state__icon">📷</div>
            <h2 class="empty-state__title">Artifact Collection</h2>
            <p class="empty-state__body">Placeholder for proof elements and screenshots.</p>
        </div>
    </main>

    <script>
        document.getElementById('mobile-menu-btn').addEventListener('click', function () {
            document.getElementById('nav-links').classList.toggle('show');
        });
    </script>
</body>

</html>
