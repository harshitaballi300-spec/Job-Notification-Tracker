<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Jobs - Job Notification Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        /* Navigation Styles */
        .nav-header {
            background-color: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            position: sticky;
            top: 0;
            z-index: var(--z-topbar);
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .nav-brand {
            font-family: var(--font-heading);
            font-size: var(--text-lg);
            color: var(--color-text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: var(--space-1);
        }

        .nav-links {
            display: flex;
            gap: var(--space-3);
        }

        .nav-link {
            font-family: var(--font-body);
            font-size: var(--text-sm);
            font-weight: var(--weight-medium);
            color: var(--color-muted);
            text-decoration: none;
            padding: var(--space-2) 0;
            border-bottom: 2px solid transparent;
            transition: color var(--duration-fast) var(--easing-standard);
        }

        .nav-link:hover {
            color: var(--color-text);
        }

        .nav-link.active {
            color: var(--color-text);
            border-bottom-color: var(--color-accent);
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: var(--text-2xl);
            cursor: pointer;
            color: var(--color-text);
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 64px;
                left: 0;
                right: 0;
                background-color: var(--color-surface);
                flex-direction: column;
                padding: var(--space-3) var(--space-5);
                border-bottom: 1px solid var(--color-border);
                box-shadow: var(--shadow-card);
            }

            .nav-links.show {
                display: flex;
            }

            .mobile-menu-btn {
                display: block;
            }
        }

        /* Page Header */
        .page-header {
            padding: var(--space-5) 0 var(--space-3) 0;
            border-bottom: 1px solid var(--color-border);
            margin-bottom: var(--space-5);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .page-title {
            font-family: var(--font-heading);
            font-size: var(--text-2xl);
            color: var(--color-text);
        }

        /* Job Grid */
        .job-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: var(--space-3);
            margin-bottom: var(--space-8);
        }

        .job-card {
            display: flex;
            flex-direction: column;
        }

        .job-card__meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: var(--space-1);
            margin-bottom: var(--space-1);
        }

        .job-card__company {
            font-weight: var(--weight-semibold);
            color: var(--color-text);
            font-size: var(--text-sm);
        }

        .job-card__tag {
            font-size: 11px;
            color: var(--color-muted);
            background-color: var(--color-overlay);
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            white-space: nowrap;
        }

        .job-card__details {
            font-size: var(--text-sm);
            color: var(--color-muted);
            margin-top: var(--space-2);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-1);
        }

        .job-card__detail-item {
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .job-card__footer {
            margin-top: auto;
            padding-top: var(--space-3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-2);
        }

        .job-card__actions {
            display: flex;
            gap: var(--space-1);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: var(--z-overlay);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-3);
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--duration-fast) var(--easing-standard);
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background-color: var(--color-surface);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            transform: translateY(20px);
            transition: transform var(--duration-fast) var(--easing-standard);
        }

        .modal-overlay.open .modal {
            transform: translateY(0);
        }

        .modal__header {
            padding: var(--space-3) var(--space-4);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }

        .modal__close {
            background: none;
            border: none;
            font-size: var(--text-xl);
            line-height: 1;
            color: var(--color-muted);
            cursor: pointer;
        }

        .modal__body {
            padding: var(--space-4);
        }

        .modal__section {
            margin-bottom: var(--space-3);
        }

        .modal__label {
            font-size: var(--text-xs);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-muted);
            margin-bottom: var(--space-1);
            font-weight: var(--weight-semibold);
        }

        .modal__desc {
            font-size: var(--text-base);
            line-height: var(--leading-relaxed);
            color: var(--color-text);
        }

        .modal__tags {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-1);
        }

        .modal__footer {
            padding: var(--space-3) var(--space-4);
            border-top: 1px solid var(--color-border);
            display: flex;
            justify-content: flex-end;
            gap: var(--space-2);
        }
    </style>
</head>

<body>

    <header class="nav-header">
        <div class="container nav-container">
            <a href="index.html" class="nav-brand">
                <div class="top-bar__logo-dot"></div>
                Job Tracker
            </a>

            <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">☰</button>

            <nav class="nav-links" id="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="saved.html" class="nav-link active">Saved</a>
                <a href="digest.html" class="nav-link">Digest</a>
                <a href="settings.html" class="nav-link">Settings</a>
                <a href="proof.html" class="nav-link">Proof</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title">Saved Jobs</h1>
            <div id="job-count" class="text-sm text-muted">Loading jobs...</div>
        </div>

        <div id="jobs-grid" class="job-grid" style="display: none;">
            <!-- Job cards will be injected here via JS -->
        </div>

        <div id="empty-state" class="empty-state">
            <div class="empty-state__icon">🔖</div>
            <h2 class="empty-state__title">No saved jobs</h2>
            <p class="empty-state__body">Jobs you bookmark from your dashboard or digest will appear here.</p>
            <a href="dashboard.html" class="btn btn--primary" style="margin-top: var(--space-3);">Browse Jobs</a>
        </div>
    </main>

    <!-- Job Details Modal -->
    <div id="job-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal__header">
                <div>
                    <div class="job-card__meta">
                        <span id="modal-company" class="job-card__company"></span>
                        <span id="modal-posted" class="job-card__tag"></span>
                        <span id="modal-source" class="job-card__tag"></span>
                    </div>
                    <h2 id="modal-title" class="card__title" style="font-size: var(--text-lg)"></h2>
                </div>
                <button class="modal__close" id="modal-close">&times;</button>
            </div>
            <div class="modal__body">
                <div class="job-card__details" style="grid-template-columns: 1fr 1fr; margin-bottom: var(--space-4);">
                    <div class="job-card__detail-item">📍 <span id="modal-location"></span></div>
                    <div class="job-card__detail-item">💼 <span id="modal-mode"></span></div>
                    <div class="job-card__detail-item">⏱️ <span id="modal-experience"></span></div>
                    <div class="job-card__detail-item">💰 <span id="modal-salary"></span></div>
                </div>

                <div class="modal__section">
                    <div class="modal__label">Description</div>
                    <div id="modal-desc" class="modal__desc"></div>
                </div>

                <div class="modal__section">
                    <div class="modal__label">Required Skills</div>
                    <div id="modal-skills" class="modal__tags"></div>
                </div>
            </div>
            <div class="modal__footer">
                <button class="btn btn--secondary" id="modal-save">Unsave Job</button>
                <a href="#" target="_blank" class="btn btn--primary" id="modal-apply">Apply Now</a>
            </div>
        </div>
    </div>

    <!-- Load data -->
    <script src="js/data.js"></script>
    <script>
        // 1. Mobile Menu Toggle
        document.getElementById('mobile-menu-btn').addEventListener('click', function () {
            document.getElementById('nav-links').classList.toggle('show');
        });

        // 2. Fetch data & setup state
        let allJobs = typeof getJobsData !== 'undefined' ? getJobsData() : [];
        let savedJobIds = JSON.parse(localStorage.getItem('savedJobs') || '[]');

        // DOM elements
        const grid = document.getElementById('jobs-grid');
        const emptyState = document.getElementById('empty-state');
        const jobCount = document.getElementById('job-count');

        // Modal elements
        const modal = document.getElementById('job-modal');
        const modalClose = document.getElementById('modal-close');

        // 3. Render Jobs Function
        function renderJobs() {
            grid.innerHTML = '';

            // Filter global jobs to only include saved ids
            const savedJobsData = allJobs.filter(job => savedJobIds.includes(job.id));
            jobCount.textContent = `${savedJobsData.length} saved job${savedJobsData.length === 1 ? '' : 's'}`;

            if (savedJobsData.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'flex';
                return;
            }

            grid.style.display = 'grid';
            emptyState.style.display = 'none';

            // Convert backwards to naturally show latest saved as first (optional, standard ordering)
            savedJobsData.forEach(job => {
                const postedText = job.postedDaysAgo === 0 ? 'Today' : `${job.postedDaysAgo}d ago`;
                const card = document.createElement('div');
                card.className = 'card job-card';
                card.innerHTML = `
                    <div class="job-card__meta">
                        <span class="job-card__company">${job.company}</span>
                        <span class="job-card__tag">${postedText}</span>
                        <span class="badge ${job.source === 'LinkedIn' ? 'badge--success' : (job.source === 'Naukri' ? 'badge--warning' : 'badge--neutral')}">${job.source}</span>
                    </div>
                    <h3 class="card__title" style="font-size: var(--text-lg); margin-bottom: var(--space-2);">${job.title}</h3>
                    
                    <div class="job-card__details">
                        <div class="job-card__detail-item">📍 ${job.location} • ${job.mode}</div>
                        <div class="job-card__detail-item">⏱️ ${job.experience}</div>
                        <div class="job-card__detail-item" style="grid-column: 1 / -1">💰 ${job.salaryRange}</div>
                    </div>

                    <div class="job-card__footer">
                        <button class="btn btn--secondary view-btn" data-id="${job.id}">View Details</button>
                        <div class="job-card__actions">
                            <button class="btn-icon save-btn" data-id="${job.id}" title="Unsave">❤️</button>
                            <a href="${job.applyUrl}" target="_blank" class="btn btn--primary" style="padding: 6px 16px;">Apply</a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            attachCardEventListeners();
        }

        function attachCardEventListeners() {
            // View Buttons
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.getAttribute('data-id');
                    const job = allJobs.find(j => j.id === id);
                    if (job) openModal(job);
                });
            });

            // Save (Unsave) Buttons
            document.querySelectorAll('.save-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const button = e.target.closest('.save-btn');
                    const id = button.getAttribute('data-id');
                    unsaveJob(id);
                });
            });
        }

        // 4. Unsave Logic
        function unsaveJob(id) {
            const index = savedJobIds.indexOf(id);
            if (index > -1) {
                savedJobIds.splice(index, 1);
                localStorage.setItem('savedJobs', JSON.stringify(savedJobIds));
                renderJobs(); // Refresh the grid
            }
            if (modal.classList.contains('open')) {
                closeModal();
            }
        }

        // 5. Modal Logic
        function openModal(job) {
            document.getElementById('modal-title').textContent = job.title;
            document.getElementById('modal-company').textContent = job.company;
            document.getElementById('modal-posted').textContent = job.postedDaysAgo === 0 ? 'Today' : `${job.postedDaysAgo}d ago`;
            document.getElementById('modal-source').textContent = job.source;
            document.getElementById('modal-location').textContent = job.location;
            document.getElementById('modal-mode').textContent = job.mode;
            document.getElementById('modal-experience').textContent = job.experience;
            document.getElementById('modal-salary').textContent = job.salaryRange;
            document.getElementById('modal-desc').textContent = job.description;
            document.getElementById('modal-apply').href = job.applyUrl;

            // Render skills
            const skillsContainer = document.getElementById('modal-skills');
            skillsContainer.innerHTML = '';
            job.skills.forEach(skill => {
                const s = document.createElement('span');
                s.className = 'job-card__tag';
                s.style.fontSize = 'var(--text-xs)';
                s.style.padding = '4px 8px';
                s.textContent = skill;
                skillsContainer.appendChild(s);
            });

            // Configure modal unsave btn
            const unsaveBtn = document.getElementById('modal-save');
            unsaveBtn.onclick = () => {
                unsaveJob(job.id);
            };

            modal.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('open');
            document.body.style.overflow = '';
        }

        modalClose.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // Init
        renderJobs();

    </script>
</body>

</html>
