<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Checklist - Job Notification Tracker</title>
    <link rel="stylesheet" href="../css/tokens.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .checklist-item {
            display: flex;
            align-items: center;
            margin-bottom: var(--space-2);
        }

        .checklist-item input {
            margin-right: var(--space-2);
        }

        .summary {
            font-size: var(--text-lg);
            margin-bottom: var(--space-3);
        }

        .warning {
            color: var(--color-error);
            font-size: var(--text-sm);
        }

        .reset-btn {
            margin-top: var(--space-3);
        }
    </style>
</head>

<body>
    <header class="nav-header">
        <div class="container nav-container">
            <a href="../index.html" class="nav-brand">
                <div class="top-bar__logo-dot"></div>
                Job Tracker
            </a>
            <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">☰</button>
            <nav class="nav-links" id="nav-links">
                <a href="../dashboard.html" class="nav-link">Dashboard</a>
                <a href="../saved.html" class="nav-link">Saved</a>
                <a href="../digest.html" class="nav-link">Digest</a>
                <a href="../settings.html" class="nav-link">Settings</a>
                <a href="../proof.html" class="nav-link">Proof</a>
                <a href="07-test.html" class="nav-link active">Test Checklist</a>
                <a href="08-ship.html" class="nav-link">Ship</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="page-header">
            <h1 class="page-title">Built‑In Test Checklist</h1>
            <div class="summary" id="test-summary">Tests Passed: 0 / 10</div>
            <div class="warning" id="test-warning" style="display:none;">Resolve all issues before shipping.</div>
        </section>

        <section id="checklist">
            <div class="checklist-item">
                <input type="checkbox" id="test1" data-tooltip="Refresh the page and verify preferences persist.">
                <label for="test1">Preferences persist after refresh</label>
            </div>
            <div class="checklist-item">
                <input type="checkbox" id="test2" data-tooltip="Inspect matchScore values for known jobs.">
                <label for="test2">Match score calculates correctly</label>
            </div>
            <div class="checklist-item">
                <input type="checkbox" id="test3"
                    data-tooltip="Toggle the 'Show only matches' checkbox and verify results.">
                <label for="test3">"Show only matches" toggle works</label>
            </div>
            <div class="checklist-item">
                <input type="checkbox" id="test4" data-tooltip="Save a job, refresh, and ensure it remains saved.">
                <label for="test4">Save job persists after refresh</label>
            </div>
            <div class="checklist-item">
                <input type="checkbox" id="test5" data-tooltip="Click Apply – it should open a new tab.">
                <label for="test5">Apply opens in new tab</label>
            </div>
            <div class="checklist-item">
                <input type="checkbox" id="test6" data-tooltip="Change a job status, refresh, and verify it stays.">
                <label for="test6">Status update persists after refresh</label>
            </div>
            <div class="checklist-item">
                <input type="checkbox" id="test7"
                    data-tooltip="Filter by a status and ensure only matching jobs appear.">
                <label for="test7">Status filter works correctly</label>
            </div>
            <div class="checklist-item">
                <input type="checkbox" id="test8"
                    data-tooltip="Generate the digest and confirm it shows 10 jobs sorted by score.">
                <label for="test8">Digest generates top 10 by score</label>
            </div>
            <div class="checklist-item">
                <input type="checkbox" id="test9"
                    data-tooltip="Refresh after generating – the same digest should load.">
                <label for="test9">Digest persists for the day</label>
            </div>
            <div class="checklist-item">
                <input type="checkbox" id="test10"
                    data-tooltip="Open console and navigate main pages – no errors should appear.">
                <label for="test10">No console errors on main pages</label>
            </div>
        </section>

        <button class="btn btn--secondary reset-btn" id="reset-tests">Reset Test Status</button>
    </main>

    <script>
        // Mobile menu toggle (same as other pages)
        document.getElementById('mobile-menu-btn').addEventListener('click', function () {
            document.getElementById('nav-links').classList.toggle('show');
        });

        const checklistIds = ['test1', 'test2', 'test3', 'test4', 'test5', 'test6', 'test7', 'test8', 'test9', 'test10'];
        const storageKey = 'testChecklistStatus';

        function loadStatus() {
            const saved = JSON.parse(localStorage.getItem(storageKey) || '{}');
            checklistIds.forEach(id => {
                const checkbox = document.getElementById(id);
                if (saved[id]) checkbox.checked = true;
                checkbox.addEventListener('change', saveStatus);
            });
            updateSummary();
        }

        function saveStatus() {
            const status = {};
            checklistIds.forEach(id => {
                status[id] = document.getElementById(id).checked;
            });
            localStorage.setItem(storageKey, JSON.stringify(status));
            updateSummary();
        }

        function updateSummary() {
            const status = JSON.parse(localStorage.getItem(storageKey) || '{}');
            const passed = checklistIds.filter(id => status[id]).length;
            document.getElementById('test-summary').textContent = `Tests Passed: ${passed} / 10`;
            const warning = document.getElementById('test-warning');
            warning.style.display = (passed < 10) ? 'block' : 'none';
        }

        document.getElementById('reset-tests').addEventListener('click', () => {
            localStorage.removeItem(storageKey);
            checklistIds.forEach(id => document.getElementById(id).checked = false);
            updateSummary();
        });

        // Simple tooltip via title attribute
        checklistIds.forEach(id => {
            const cb = document.getElementById(id);
            const tip = cb.getAttribute('data-tooltip');
            if (tip) cb.title = tip;
        });

        loadStatus();
    </script>
</body>

</html>
